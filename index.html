<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storyboarder</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- PptxGenJS for PowerPoint export -->
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="flex h-screen bg-[#f4f4f7] text-[#1e293b] overflow-hidden font-sans">
    <!-- Sidebar -->
    <div class="w-[320px] bg-[#ffffff] border-r border-[#e2e8f0] flex flex-col p-6 shrink-0 z-10">
        <div class="flex-1 flex flex-col overflow-y-auto">
            <div class="mb-5">
                <input type="text" id="titleInput" placeholder="Film Title" class="w-full px-3 py-3 border border-[#e2e8f0] rounded-[6px] text-[13px] bg-[#fcfcfd] focus:outline-none focus:border-[#3b82f6] transition-colors" />
            </div>
            
            <div class="flex-1 flex flex-col mb-5">
                <textarea id="scriptInput" placeholder="Script (Split with ---)" class="w-full flex-1 min-h-[420px] px-3 py-3 border border-[#e2e8f0] rounded-[6px] text-[13px] bg-[#fcfcfd] focus:outline-none focus:border-[#3b82f6] resize-none leading-relaxed transition-colors"></textarea>
            </div>
        </div>

        <button id="exportBtn" class="mt-auto bg-[#94a3b8] hover:bg-[#64748b] text-white py-[14px] px-4 rounded-[8px] font-semibold text-[14px] flex items-center justify-center gap-2 transition-colors">
            <i data-lucide="download" class="w-[18px] h-[18px]"></i>
            EXPORT
        </button>
    </div>

    <!-- Preview Area -->
    <div id="previewArea" class="flex-1 overflow-y-auto p-10 flex flex-col items-center gap-8">
        <!-- Pages will be dynamically injected here by script.js -->
    </div>

    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
